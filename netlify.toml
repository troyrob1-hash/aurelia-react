[build]
  command   = "npm run build"
  publish   = "dist"
  functions = "netlify/functions"

[[redirects]]
  from   = "/api/claude"
  to     = "/.netlify/functions/claude"
  status = 200

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

[build.environment]
  # Node 22 is required by vitest 4 (engines: ^20 || ^22 || >=24) and provides
  # util.styleText (added in 20.12 / 21.7) which vitest's rolldown bundles
  # import. Node 18 ended life in April 2025; Netlify supports 18/20/22 with
  # 22 being the current active LTS shipped on their ubuntu-jammy build image.
  NODE_VERSION = "22"
